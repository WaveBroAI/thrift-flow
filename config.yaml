server:
  host: "0.0.0.0"
  port: 8888

# ── Model aliases ──────────────────────────────────────────────────────────────
# Map tier names (cheap / medium / strong / auto) to real LiteLLM model names.
# The model name prefix determines the provider — no other config needed.
# Set the corresponding API key in .env.
#
# Provider prefix reference:
#   openrouter/org/model-name   → OPENROUTER_API_KEY
#   groq/model-name             → GROQ_API_KEY
#   anthropic/model-name        → ANTHROPIC_API_KEY
#   openai/model-name           → OPENAI_API_KEY
#   gemini/model-name           → GEMINI_API_KEY
#   together_ai/model-name      → TOGETHERAI_API_KEY
#
# Example multi-provider setup (Phase 2):
#   cheap:  "groq/llama-3.1-8b-instant"
#   medium: "openrouter/qwen/qwen3-235b-a22b"
#   strong: "anthropic/claude-sonnet-4-5"
models:
  aliases:
    cheap:  "openrouter/minimax/minimax-m2.5"
    medium: "openrouter/minimax/minimax-m2.5"
    strong: "openrouter/minimax/minimax-m2.5"
    auto:   "openrouter/minimax/minimax-m2.5"   # Phase 2: routing will pick tier dynamically
  default: "cheap"

tracking:
  db: "tracking.db"
  enabled: true

logging:
  level: "INFO"

# ── Adaptive Model Routing (Phase 2) ───────────────────────────────────────────
# Disabled by default.  Requires model: "auto" wiring in server.py (PR B) to
# have any effect on routing decisions.
#
# To enable:
#   1. Set enabled: true
#   2. Set categorizer_model to a fast cheap LLM (Groq recommended for ~220ms)
#   3. Set categorizer_api_key_env to the env var holding the API key
#   4. Ensure the key is exported: export GROQ_API_KEY=gsk_...
#
# categorizer_model examples:
#   "groq/llama-3.1-8b-instant"          — fastest, ~220ms, requires GROQ_API_KEY
#   "openrouter/meta-llama/llama-3.1-8b" — fallback via OpenRouter
routing:
  enabled: false
  categorizer_model: null            # e.g. "groq/llama-3.1-8b-instant"
  categorizer_api_base: null         # custom endpoint; null = litellm default
  categorizer_api_key_env: null      # e.g. "GROQ_API_KEY"
  db: "tracking.db"                  # shared file with tracking (separate table)
  tier_mapping_version: "v1"
  confidence_threshold: 0.7          # min confidence for embedding pool eligibility
  min_prompt_length_for_pool: 10     # min prompt chars for pool eligibility
  session_ttl_seconds: 1800          # session context cache TTL (30 min)
  categorizer_timeout: 5.0           # categorizer LLM call timeout (seconds)
  max_session_cache_size: 1000       # max in-process session entries (FIFO eviction)
  embedding_enabled: false           # false / "shadow" / true
  embedding_model: "intfloat/multilingual-e5-small"
  embedding_k: 5
  embedding_min_pool_size: 20
  embedding_pool_cache_ttl: 300.0    # pool cache TTL in seconds
